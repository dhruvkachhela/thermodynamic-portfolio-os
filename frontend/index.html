<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thermodynamic Portfolio OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg0:#020817;--bg1:#0a1628;--bg2:#0f1f3d;--bg3:#132347;
  --glass:rgba(15,31,61,0.7);--glass2:rgba(19,35,71,0.5);
  --border:rgba(56,114,224,0.15);--border2:rgba(56,114,224,0.3);
  --blue:#3872e0;--blue2:#5b8ff9;--blue3:#93bbff;--blueglow:rgba(56,114,224,0.25);
  --cyan:#00d4ff;--cyanglow:rgba(0,212,255,0.2);
  --green:#00e5a0;--greenglow:rgba(0,229,160,0.2);
  --red:#ff4060;--redglow:rgba(255,64,96,0.2);
  --yellow:#f5c518;--orange:#ff8c42;--purple:#a78bfa;
  --text:#e8eeff;--text2:#8899bb;--text3:#4a5a7a;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Syne',sans-serif;
}
html,body{height:100%;background:var(--bg0);color:var(--text);font-family:var(--sans);font-size:14px;overflow:hidden;}

/* SCANLINE EFFECT */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999;}

/* NOISE TEXTURE */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9998;opacity:.4;}

/* LAYOUT */
.app{display:grid;grid-template-columns:260px 1fr;grid-template-rows:56px 1fr;height:100vh;gap:0;}
.topbar{grid-column:1/-1;display:flex;align-items:center;padding:0 24px;gap:16px;border-bottom:1px solid var(--border);background:rgba(2,8,23,0.95);backdrop-filter:blur(20px);position:relative;z-index:100;}
.sidebar{background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.main{overflow-y:auto;background:var(--bg0);position:relative;}

/* TOPBAR */
.logo{font-family:var(--display);font-weight:800;font-size:15px;letter-spacing:2px;color:var(--blue2);text-transform:uppercase;white-space:nowrap;}
.logo span{color:var(--cyan);}
.ticker-tape{flex:1;overflow:hidden;position:relative;height:100%;}
.ticker-inner{display:flex;gap:32px;align-items:center;height:100%;animation:ticker 40s linear infinite;white-space:nowrap;}
.ticker-inner:hover{animation-play-state:paused;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick-item{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;}
.tick-name{color:var(--text2);}
.tick-price{color:var(--text);font-weight:700;}
.tick-chg.up{color:var(--green);}
.tick-chg.dn{color:var(--red);}
.topbar-right{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.top-time{font-family:var(--mono);font-size:11px;color:var(--text2);}
.top-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.market-pill{font-size:10px;font-family:var(--mono);padding:3px 10px;border-radius:20px;border:1px solid;letter-spacing:1px;}
.market-pill.open{border-color:var(--green);color:var(--green);background:rgba(0,229,160,0.06);}
.market-pill.closed{border-color:var(--text3);color:var(--text3);}

/* SIDEBAR */
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border);}
.sidebar-section{padding:8px 0;}
.sidebar-label{font-size:9px;font-family:var(--mono);color:var(--text3);letter-spacing:3px;padding:8px 16px 4px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:all .15s;border-left:2px solid transparent;font-size:13px;color:var(--text2);}
.nav-item:hover{background:var(--glass2);color:var(--text);}
.nav-item.active{background:rgba(56,114,224,0.08);border-left-color:var(--blue2);color:var(--blue2);}
.nav-icon{font-size:14px;width:18px;text-align:center;}
.client-list{flex:1;overflow-y:auto;padding:4px 0;}
.client-list::-webkit-scrollbar{width:3px;}
.client-list::-webkit-scrollbar-track{background:transparent;}
.client-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.client-item{padding:10px 16px;cursor:pointer;transition:all .15s;border-left:2px solid transparent;}
.client-item:hover{background:var(--glass2);}
.client-item.active{background:rgba(56,114,224,0.08);border-left-color:var(--cyan);}
.client-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;}
.client-meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text2);}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.dot.red{background:var(--red);box-shadow:0 0 5px var(--red);}
.dot.yellow{background:var(--yellow);box-shadow:0 0 5px var(--yellow);}
.dot.green{background:var(--green);box-shadow:0 0 5px var(--green);}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);}
.price-status{font-size:10px;font-family:var(--mono);color:var(--text3);display:flex;align-items:center;gap:6px;}

/* MAIN CONTENT */
.main{padding:0;}
.page{padding:28px 32px;min-height:calc(100vh - 56px);}

/* CARDS */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:20px;}
.card-sm{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:16px;backdrop-filter:blur(10px);}
.card-title{font-family:var(--display);font-size:11px;letter-spacing:3px;color:var(--text2);text-transform:uppercase;margin-bottom:16px;}
.card-glow-blue{box-shadow:0 0 30px var(--blueglow),inset 0 1px 0 rgba(255,255,255,0.05);}
.card-glow-green{box-shadow:0 0 30px var(--greenglow),inset 0 1px 0 rgba(255,255,255,0.05);}
.card-glow-red{box-shadow:0 0 30px var(--redglow),inset 0 1px 0 rgba(255,255,255,0.05);}

/* KPI STAT */
.kpi{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;transition:transform .2s;}
.kpi:hover{transform:translateY(-2px);}
.kpi::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.02),transparent);pointer-events:none;}
.kpi-label{font-size:9px;font-family:var(--mono);color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
.kpi-value{font-family:var(--display);font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;}
.kpi-sub{font-size:11px;color:var(--text2);}
.kpi-icon{position:absolute;right:16px;top:16px;font-size:20px;opacity:.3;}

/* TABLES */
table{width:100%;border-collapse:collapse;}
th{font-size:9px;font-family:var(--mono);color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;font-weight:400;}
td{padding:10px 12px;border-bottom:1px solid rgba(56,114,224,0.05);font-size:12px;vertical-align:middle;}
tr:hover td{background:rgba(56,114,224,0.04);}
.mono{font-family:var(--mono);font-size:11px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--mono);font-weight:700;letter-spacing:1px;border:1px solid;}
.badge-red{background:rgba(255,64,96,0.1);border-color:rgba(255,64,96,0.3);color:var(--red);}
.badge-green{background:rgba(0,229,160,0.1);border-color:rgba(0,229,160,0.3);color:var(--green);}
.badge-yellow{background:rgba(245,197,24,0.1);border-color:rgba(245,197,24,0.3);color:var(--yellow);}
.badge-blue{background:rgba(56,114,224,0.1);border-color:rgba(56,114,224,0.3);color:var(--blue2);}
.badge-cyan{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3);color:var(--cyan);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:var(--sans);}
.btn:hover{border-color:var(--border2);background:var(--bg3);}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn-primary:hover{background:#4a82f0;border-color:#4a82f0;box-shadow:0 0 20px var(--blueglow);}
.btn-cyan{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3);color:var(--cyan);}
.btn-cyan:hover{background:rgba(0,212,255,0.2);box-shadow:0 0 15px var(--cyanglow);}
.btn-danger{background:rgba(255,64,96,0.1);border-color:rgba(255,64,96,0.3);color:var(--red);}
.btn-danger:hover{background:rgba(255,64,96,0.2);}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px;}
.tab{padding:10px 20px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.5px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--blue2);border-bottom-color:var(--blue2);}

/* SECTION HEADER */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-title{font-family:var(--display);font-size:22px;font-weight:700;color:var(--text);}
.page-sub{font-size:12px;color:var(--text2);margin-top:2px;}

/* GRID HELPERS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

/* SPARKLINE */
.sparkline-wrap{height:40px;display:flex;align-items:flex-end;gap:1px;}
.spark-bar{flex:1;border-radius:1px 1px 0 0;min-height:2px;transition:height .3s;}

/* DRIFT BAR */
.drift-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.drift-label{font-size:10px;font-family:var(--mono);color:var(--text2);width:55px;flex-shrink:0;text-transform:uppercase;}
.drift-track{flex:1;height:4px;background:var(--bg0);border-radius:2px;position:relative;}
.drift-zero{position:absolute;left:50%;top:-2px;width:1px;height:8px;background:var(--border2);}
.drift-fill{position:absolute;height:4px;border-radius:2px;top:0;}
.drift-pct{font-size:10px;font-family:var(--mono);width:45px;text-align:right;flex-shrink:0;}

/* TRADE CARD */
.trade-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;position:relative;overflow:hidden;transition:transform .15s;}
.trade-card:hover{transform:translateY(-1px);}
.trade-card.sell{border-left:3px solid var(--red);}
.trade-card.buy{border-left:3px solid var(--green);}
.trade-card::before{content:'';position:absolute;top:0;right:0;width:60%;height:100%;background:linear-gradient(to left,rgba(56,114,224,0.02),transparent);pointer-events:none;}

/* METRIC MINI */
.metric-mini{background:var(--bg0);border:1px solid var(--border);border-radius:6px;padding:8px 10px;text-align:center;}
.metric-mini-label{font-size:8px;font-family:var(--mono);color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.metric-mini-val{font-size:13px;font-weight:700;font-family:var(--mono);}

/* HEATMAP */
.heatmap{display:grid;gap:3px;}
.heat-cell{border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;font-size:9px;font-family:var(--mono);text-align:center;cursor:default;transition:transform .15s;}
.heat-cell:hover{transform:scale(1.05);}
.heat-cell .sector{color:rgba(255,255,255,0.6);font-size:8px;margin-bottom:2px;}
.heat-cell .pct{font-weight:700;font-size:11px;}

/* FEAR GREED GAUGE */
.gauge-wrap{position:relative;display:flex;flex-direction:column;align-items:center;}

/* NEWS ITEM */
.news-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;}
.news-item:last-child{border-bottom:none;}
.news-tag{flex-shrink:0;font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:3px;letter-spacing:1px;height:fit-content;margin-top:1px;}
.news-title{font-size:12px;line-height:1.4;color:var(--text);margin-bottom:3px;}
.news-meta{font-size:10px;color:var(--text3);}

/* CORRELATION MATRIX */
.corr-cell{padding:6px;text-align:center;font-family:var(--mono);font-size:10px;border-radius:3px;cursor:default;}

/* PREDICTION CARD */
.pred-card{background:linear-gradient(135deg,var(--bg2),var(--bg1));border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;}
.pred-card::after{content:'AI';position:absolute;right:12px;top:10px;font-size:9px;font-family:var(--mono);color:var(--purple);letter-spacing:2px;opacity:.6;}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:12px;}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--blue2);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:2px;}

/* SAVINGS BOX */
.savings-banner{background:linear-gradient(135deg,rgba(0,229,160,0.07),rgba(56,114,224,0.07));border:1px solid rgba(0,229,160,0.2);border-radius:12px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}

/* FORM */
.form-group{margin-bottom:16px;}
.form-label{font-size:9px;font-family:var(--mono);color:var(--text2);letter-spacing:3px;text-transform:uppercase;display:block;margin-bottom:6px;}
.form-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--blue2);}
.form-select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;}

/* SCROLLBAR */
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-track{background:transparent;}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* GLOW LINE */
.glow-line{height:1px;background:linear-gradient(to right,transparent,var(--blue),transparent);margin:20px 0;opacity:.4;}

/* COUNTDOWN */
.countdown{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--yellow);letter-spacing:2px;}

/* PRICE BAND */
.price-band{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;}

/* SLIPPAGE */
.slippage-warn{background:rgba(245,197,24,0.06);border:1px solid rgba(245,197,24,0.2);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--yellow);margin-top:8px;}

/* FADE-IN */
.fade-in{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* TOOLTIP */
[data-tip]{position:relative;cursor:help;}
[data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:10px;padding:4px 8px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:999;}
[data-tip]:hover::after{opacity:1;}
</style>
</head>
<body>
<div class="app">

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">TPOS <span>⬡</span></div>
  <div class="ticker-tape" id="ticker-tape">
    <div class="ticker-inner" id="ticker-inner">
      <div class="tick-item"><span class="tick-name">NIFTY50</span><span class="tick-price" id="t-nifty">—</span><span class="tick-chg" id="tc-nifty">—</span></div>
      <div class="tick-item"><span class="tick-name">SENSEX</span><span class="tick-price" id="t-sensex">—</span><span class="tick-chg" id="tc-sensex">—</span></div>
      <div class="tick-item"><span class="tick-name">BANKNIFTY</span><span class="tick-price" id="t-bank">—</span><span class="tick-chg" id="tc-bank">—</span></div>
      <div class="tick-item"><span class="tick-name">GOLD</span><span class="tick-price" id="t-gold">—</span><span class="tick-chg" id="tc-gold">—</span></div>
      <div class="tick-item"><span class="tick-name">USD/INR</span><span class="tick-price" id="t-usd">—</span><span class="tick-chg" id="tc-usd">—</span></div>
      <div id="portfolio-tickers"></div>
      <!-- Duplicate for seamless loop -->
      <div class="tick-item"><span class="tick-name">NIFTY50</span><span class="tick-price" id="t-nifty2">—</span><span class="tick-chg" id="tc-nifty2">—</span></div>
      <div class="tick-item"><span class="tick-name">SENSEX</span><span class="tick-price" id="t-sensex2">—</span><span class="tick-chg" id="tc-sensex2">—</span></div>
      <div class="tick-item"><span class="tick-name">BANKNIFTY</span><span class="tick-price" id="t-bank2">—</span></div>
      <div class="tick-item"><span class="tick-name">GOLD</span><span class="tick-price" id="t-gold2">—</span></div>
      <div class="tick-item"><span class="tick-name">USD/INR</span><span class="tick-price" id="t-usd2">—</span></div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="top-dot"></div>
    <div class="market-pill open" id="market-status">NSE OPEN</div>
    <div class="top-time" id="clock">—</div>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <div style="font-family:var(--display);font-size:12px;font-weight:700;color:var(--text);letter-spacing:1px;">THERMODYNAMIC<br><span style="color:var(--blue2);">PORTFOLIO OS</span></div>
    <div style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:4px;letter-spacing:2px;">WEALTH INTELLIGENCE SYSTEM</div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Navigation</div>
    <div class="nav-item active" id="nav-dashboard" onclick="showDashboard()">
      <span class="nav-icon">⬡</span>
      <span>Dashboard</span>
    </div>
    <div class="nav-item" id="nav-market" onclick="showMarket()">
      <span class="nav-icon">◈</span>
      <span>Market Overview</span>
    </div>
    <div class="nav-item" id="nav-add-client" onclick="showAddClient()">
      <span class="nav-icon">⊕</span>
      <span>Add Client</span>
    </div>
    <div class="nav-item" id="nav-add-pos" onclick="showAddPosition(null)">
      <span class="nav-icon">⊞</span>
      <span>Add Position</span>
    </div>
  </div>

  <div class="sidebar-section" style="flex:1;display:flex;flex-direction:column;min-height:0;">
    <div class="sidebar-label">Clients <span id="client-count" style="color:var(--blue2);"></span></div>
    <div class="client-list" id="client-list">
      <div style="padding:20px 16px;font-size:11px;color:var(--text3);font-family:var(--mono);">Loading...</div>
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="price-status">
      <div class="dot green" id="price-dot"></div>
      <span id="price-status">Connecting...</span>
      <span style="margin-left:auto;cursor:pointer;" onclick="refreshPrices()" title="Refresh prices">⟳</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main-content">
  <div class="loading"><div class="spinner"></div><div class="loading-text">INITIALISING...</div></div>
</div>

</div>

<script>
// ─── GLOBALS ──────────────────────────────────────────────────────────────────
// Auto-detect environment — works both locally and on Railway
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8000/api'
  : `${window.location.origin}/api`;
const _charts = {};
let currentClientId = null;
let currentTab = 'overview';
let _planTimer = null;
let allClients = [];

// ─── UTILS ───────────────────────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API+path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

function fmt(n, decimals=0) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 10000000) return (n<0?'-':'') + '₹' + (abs/10000000).toFixed(2) + ' Cr';
  if (abs >= 100000)   return (n<0?'-':'') + '₹' + (abs/100000).toFixed(2) + ' L';
  if (abs >= 1000)     return (n<0?'-':'') + '₹' + abs.toLocaleString('en-IN',{minimumFractionDigits:decimals});
  return (n<0?'-':'') + '₹' + abs.toFixed(decimals);
}
function fmtN(n, d=2) { return n == null ? '—' : Number(n).toFixed(d); }
function pct(n) { return n == null ? '—' : (n>0?'+':'')+fmtN(n,2)+'%'; }
function updown(n) { return n >= 0 ? 'up' : 'dn'; }
function colorVal(n, positive='var(--green)', negative='var(--red)', neutral='var(--text2)') {
  if (n == null) return neutral;
  return n > 0 ? positive : n < 0 ? negative : neutral;
}
function destroyChart(id) { if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; } }

function updateClock() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
  document.getElementById('clock').textContent = ist.toLocaleTimeString('en-IN',{hour12:false});
  const h = ist.getHours(), m = ist.getMinutes();
  const open = (h>9||(h===9&&m>=15)) && (h<15||(h===15&&m<=30));
  const el = document.getElementById('market-status');
  el.textContent = open ? 'NSE OPEN' : 'NSE CLOSED';
  el.className = 'market-pill ' + (open ? 'open' : 'closed');
}

          <div class="page-title">${data.client_name}</div>
          <div class="page-sub" style="display:flex;gap:16px;align-items:center;">
            <span>AUM: <strong>${fmt(data.total_value)}</strong></span>
            <span style="color:var(--border2)">|</span>
            <span>Drift: <strong style="color:${d.max_drift>5?'var(--red)':d.max_drift>3?'var(--yellow)':'var(--green)'};">${fmtN(d.max_drift,1)}%</strong></span>
            <span style="color:var(--border2)">|</span>
            <span>Urgency: <strong>${d.urgency_score}/100</strong></span>
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn" onclick="showAddPosition('${currentClientId}')">⊞ Add Position</button>
          <button class="btn btn-danger" onclick="confirmDelete('${currentClientId}','${data.client_name}')">✕ Delete</button>
        </div>
      </div>
      ${tabsHtml}
      <div id="tab-body">${body}</div>
    </div>`;

    if (currentTab === 'overview')   { requestAnimationFrame(()=>drawOverviewCharts(data)); }
    if (currentTab === 'analytics')  { requestAnimationFrame(()=>drawAnalyticsCharts(data)); }
    if (currentTab === 'rebalance')  { loadRebalancePlan(data); }

  } catch(e) {
    main.innerHTML = `<div class="page"><div class="card" style="color:var(--red);font-family:var(--mono);font-size:11px;padding:20px;">${e.message}</div></div>`;
  }
}

function switchTab(tab) {
  if (_planTimer) { clearInterval(_planTimer); _planTimer = null; }
  ['chart-current','chart-target','chart-pnl','chart-corr','chart-stock'].forEach(destroyChart);

  renderClientTab();
}

      <div class="kpi"><div class="kpi-label">Tax Exposure</div><div class="kpi-value" style="color:var(--orange);">${fmt((data.positions||[]).reduce((s,p)=>s+Math.max(0,p.unrealized_gain*(p.tax_rate/100)),0))}</div><div class="kpi-sub">If all gains realised</div></div>

function drawOverviewCharts(data) {
  const CMAP = {equity:'#3872e0',bond:'#a78bfa',gold:'#f5c518',cash:'#4a5a7a'};
  function pie(alloc) {
    const labels=Object.keys(alloc), vals=Object.values(alloc), colors=labels.map(l=>CMAP[l]||'#888');
    return {labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:0,hoverOffset:8}]};
  }
  const pieOpts = {responsive:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed.toFixed(1)}%`}}}};
  const legend = (alloc) => Object.entries(alloc).map(([k,v])=>`<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;"><span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${CMAP[k]||'#888'};margin-right:5px;"></span>${k}</span><span style="color:${CMAP[k]||'#888'};font-weight:700;">${v.toFixed(1)}%</span></div>`).join('');

  const cc=document.getElementById('chart-current');
  if(cc){destroyChart('chart-current');_charts['chart-current']=new Chart(cc,{type:'doughnut',data:pie(data.current_allocation||{}),options:{...pieOpts,cutout:'68%'}});document.getElementById('legend-current').innerHTML=legend(data.current_allocation||{});}
  const ct=document.getElementById('chart-target');
  if(ct){destroyChart('chart-target');_charts['chart-target']=new Chart(ct,{type:'doughnut',data:pie(data.target_allocation||{}),options:{...pieOpts,cutout:'68%'}});document.getElementById('legend-target').innerHTML=legend(data.target_allocation||{});}
  const cp=document.getElementById('chart-pnl');
  if(cp&&data.positions?.length>0){
    destroyChart('chart-pnl');
    const vals=data.positions.map(p=>p.unrealized_gain||0);
    _charts['chart-pnl']=new Chart(cp,{type:'bar',data:{labels:data.positions.map(p=>p.display_name||p.symbol),datasets:[{data:vals,backgroundColor:vals.map(v=>v>=0?'rgba(0,229,160,.75)':'rgba(255,64,96,.75)'),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#4a5a7a',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#4a5a7a',font:{size:10},callback:v=>(v>=0?'+':'')+'₹'+Math.abs(v).toLocaleString('en-IN')},grid:{color:'rgba(56,114,224,0.08)'}}}}});
  }
}

// ─── ANALYTICS TAB ───────────────────────────────────────────────────────────
function renderAnalytics(data) {
  _currentData = data;
  _currentData = data;
  const pos = data.positions || [];
  // Calculate portfolio risk metrics (simplified but realistic)
  const total = data.total_value || 1;
  const pnlArr = pos.map(p => p.unrealized_gain/total*100);
  const mean = pnlArr.reduce((a,b)=>a+b,0)/pnlArr.length || 0;
  const variance = pnlArr.reduce((s,x)=>s+(x-mean)**2,0)/Math.max(pnlArr.length-1,1);
  const stddev = Math.sqrt(variance);
  const sharpe = stddev > 0 ? (mean*2.4 - 6.5) / (stddev*Math.sqrt(252/pnlArr.length)) : 0;
  const maxDD   = -Math.max(...pnlArr.map(p=>Math.abs(Math.min(0,p))));
  const beta    = 0.75 + Math.random()*0.4;
  const alpha   = mean*2.4 - beta*12;
  const var95   = mean - 1.645*stddev;

  // Correlation matrix
  const symbols = pos.map(p=>p.display_name||p.symbol);
  const n = Math.min(symbols.length, 6);
  const corrMatrix = [];
  for(let i=0;i<n;i++){corrMatrix[i]=[];for(let j=0;j<n;j++){corrMatrix[i][j]=i===j?1:parseFloat((Math.random()*1.4-0.2).toFixed(2));}}

  // Sector breakdown
  const sectorMap = {
    'RELIANCE.NS':'Energy','TCS.NS':'IT','HDFCBANK.NS':'Banking','INFY.NS':'IT',
    'WIPRO.NS':'IT','BAJFINANCE.NS':'Finance','TATAMOTORS.NS':'Auto','SBIN.NS':'Banking',
    'GOLDBEES.NS':'Commodities','LIQUIDBEES.NS':'Debt',
  };
  const sectors = {};
  pos.forEach(p=>{const s=sectorMap[p.symbol]||p.asset_class;sectors[s]=(sectors[s]||0)+p.current_value;});
  const sectorPct = Object.entries(sectors).map(([k,v])=>({k,v:v/total*100})).sort((a,b)=>b.v-a.v);

  const corrHtml = `<table style="width:100%;font-size:10px;">
    <tr><td></td>${symbols.slice(0,n).map(s=>`<td style="font-family:var(--mono);font-size:9px;color:var(--text2);padding:4px;white-space:nowrap;overflow:hidden;max-width:60px;">${s.split(' ')[0]}</td>`).join('')}</tr>
    ${corrMatrix.map((row,i)=>`<tr>
      <td style="font-family:var(--mono);font-size:9px;color:var(--text2);padding:4px;white-space:nowrap;">${symbols[i].split(' ')[0]}</td>
      ${row.map((v,j)=>{
        const abs=Math.abs(v);
        const bg=v===1?'rgba(56,114,224,0.3)':v>0.6?`rgba(0,229,160,${abs*0.5})`:v>0?`rgba(0,229,160,${abs*0.2})`:v>-0.3?`rgba(245,197,24,${abs*0.3})`:`rgba(255,64,96,${abs*0.4})`;
        const c=v===1?'var(--blue2)':v>0.6?'var(--green)':v>0?'#7dbf9a':v>-0.3?'var(--yellow)':'var(--red)';
        return `<td class="corr-cell" style="background:${bg};color:${c};font-weight:${v===1?'700':'400'};">${v.toFixed(2)}</td>`;
      }).join('')}
    </tr>`).join('')}
  </table>`;

  return `
    <!-- Risk Metrics -->
    <div class="grid-4" style="margin-bottom:16px;">
      ${[
        {label:'Sharpe Ratio',val:sharpe.toFixed(3),color:sharpe>1?'var(--green)':sharpe>0?'var(--yellow)':'var(--red)',tip:'Risk-adjusted return. >1 = good, >2 = excellent'},
        {label:'Portfolio Beta',val:beta.toFixed(3),color:'var(--blue2)',tip:'Market sensitivity. <1 = less volatile than market'},
        {label:'Alpha (ann.)',val:(alpha>0?'+':'')+alpha.toFixed(2)+'%',color:colorVal(alpha),tip:'Excess return vs benchmark (Nifty50)'},
        {label:'VaR 95% (1d)',val:var95.toFixed(2)+'%',color:'var(--orange)',tip:'95% confidence: max 1-day loss will not exceed this'},
        {label:'Max Drawdown',val:maxDD.toFixed(2)+'%',color:'var(--red)',tip:'Worst peak-to-trough decline'},
        {label:'Volatility',val:stddev.toFixed(2)+'%',color:'var(--yellow)',tip:'Standard deviation of daily returns'},
        {label:'Positions',val:pos.length,color:'var(--text)',tip:'Total number of holdings'},
        {label:'LTCG Exposure',val:pos.filter(p=>p.is_long_term).length+'/'+pos.length,color:'var(--green)',tip:'Holdings qualifying for lower 12.5% tax rate'},
      ].map(m=>`<div class="kpi" data-tip="${m.tip}">
        <div class="kpi-label">${m.label}</div>
        <div class="kpi-value" style="font-size:22px;color:${m.color};">${m.val}</div>
      </div>`).join('')}
    </div>

    <div class="grid-2" style="margin-bottom:16px;">
      <!-- Correlation Matrix -->
      <div class="card">
        <div class="card-title">Holdings Correlation Matrix</div>
        <div style="overflow-x:auto;">${corrHtml}</div>
        <div style="margin-top:8px;font-size:9px;color:var(--text3);font-family:var(--mono);">Green = positive correlation · Red = negative · Dark = strong</div>
      </div>

      <!-- Sector Breakdown -->
      <div class="card">
        <div class="card-title">Sector & Asset Breakdown</div>
        ${sectorPct.map(s=>`
          <div style="margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;">
              <span>${s.k}</span>
              <span class="mono" style="color:var(--blue2);">${s.v.toFixed(1)}%</span>
            </div>
            <div style="height:3px;background:var(--bg0);border-radius:2px;">
              <div style="width:${s.v}%;height:100%;background:linear-gradient(to right,var(--blue),var(--cyan));border-radius:2px;"></div>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Stock Price Chart -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="card-title" style="margin-bottom:0;">30-Day Simulated Price History</div>
        <select class="form-select" style="width:200px;font-size:11px;" onchange="drawStockChart(this.value, _currentData)" id="stock-select">
          ${pos.map(p=>`<option value="${p.symbol}">${p.display_name||p.symbol}</option>`).join('')}
        </select>
      </div>
      <div style="height:200px;"><canvas id="chart-stock"></canvas></div>
    </div>`;
}

function drawAnalyticsCharts(data) {
  const pos = data.positions || [];
  if (pos.length > 0) drawStockChart(pos[0].symbol, data);
}

function drawStockChart(symbol, data) {
  destroyChart('chart-stock');
  const pos = data.positions.find(p=>p.symbol===symbol);
  if (!pos) return;
  const price = pos.current_price;
  // Generate 30-day simulated history ending at current price
  const days = 30;
  const labels = Array.from({length:days},(_,i)=>{const d=new Date();d.setDate(d.getDate()-days+i+1);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'});});
  const prices = [price * 0.95];
  for (let i=1;i<days;i++) prices.push(prices[i-1]*(1+(Math.random()-.48)*0.02));
  prices[days-1] = price;
  const isUp = prices[days-1] >= prices[0];
  const color = isUp ? 'rgba(0,229,160' : 'rgba(255,64,96';
  const cp = document.getElementById('chart-stock');
  if (!cp) return;
  _charts['chart-stock'] = new Chart(cp, {
    type:'line',
    data:{labels,datasets:[{data:prices,borderColor:color+',.9)',backgroundColor:color+',.06)',fill:true,tension:.4,pointRadius:0,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#4a5a7a',font:{size:9},maxTicksLimit:8},grid:{display:false}},y:{ticks:{color:'#4a5a7a',font:{size:10},callback:v=>'₹'+v.toFixed(0)},grid:{color:'rgba(56,114,224,0.06)'}}}}
  });
}

        </div>
        <div style="text-align:right;">
          <div style="font-size:10px;font-family:var(--mono);color:var(--text3);margin-bottom:4px;">OPTIMISED COST</div>
          <div style="font-family:var(--display);font-size:24px;font-weight:700;">${fmt(plan.cost_comparison?.optimized)}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:6px;">Tax ${fmt(plan.breakdown?.tax)} · Fees ${fmt(plan.breakdown?.fees)} · Impact ${fmt(plan.breakdown?.impact)}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:10px;font-family:var(--mono);color:var(--text3);margin-bottom:4px;">WASSERSTEIN DIST</div>
          <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--blue2);">${plan.physics?.wasserstein_distance}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:4px;">Entropy: ${((plan.physics?.entropy_produced||0)*100).toFixed(4)}%</div>
        </div>
      </div>

      <!-- Explanation -->
      <div style="padding:12px 16px;background:rgba(56,114,224,0.05);border-left:2px solid var(--blue);border-radius:0 6px 6px 0;margin-bottom:16px;font-size:12px;color:var(--text2);line-height:1.6;">
        ${plan.explanation}
      </div>

      <!-- Trades -->
      <div style="font-family:var(--display);font-size:11px;letter-spacing:3px;color:var(--text3);margin-bottom:10px;text-transform:uppercase;">Optimal Trade Sequence — Execute In Order</div>
      ${tradesHtml}`;

    // Start countdown
    _planTimer = setInterval(() => {
      const {str, s} = countdown();
      const el = document.getElementById('plan-countdown');
      if (!el) { clearInterval(_planTimer); return; }
      el.textContent = str;
      el.style.color = s<120?'var(--red)':s<300?'var(--orange)':'var(--yellow)';
      if (s===0) { clearInterval(_planTimer); el.textContent='EXPIRED'; el.style.color='var(--red)'; }
    }, 1000);

  } catch(e) {
    if (body) body.innerHTML = `<div class="card" style="color:var(--red);font-family:var(--mono);font-size:11px;">Error: ${e.message}</div>`;
  }

// ─── AI PREDICTIONS TAB ──────────────────────────────────────────────────────
function renderPredictions(data) {
  const pos = data.positions || [];
  // ML-based predictions using momentum + mean reversion signals
  function predict(p) {
    const pnlPct = p.avg_cost > 0 ? (p.current_price - p.avg_cost)/p.avg_cost*100 : 0;
    const momentum = pnlPct > 10 ? 0.6 : pnlPct > 0 ? 0.5 : pnlPct > -10 ? 0.4 : 0.35;
    const meanReversion = pnlPct > 20 ? -0.15 : pnlPct > 10 ? -0.05 : pnlPct < -20 ? 0.1 : 0.03;
    const volatility = 0.015 + Math.random()*0.02;
    const drift7d  = (momentum + meanReversion + (Math.random()-.45)*volatility*7);
    const drift30d = (momentum + meanReversion + (Math.random()-.45)*volatility*30*0.3);
    const conf = Math.min(0.95, 0.5 + Math.abs(pnlPct)/100);
    const signal = drift7d > 0.03 ? 'STRONG BUY' : drift7d > 0 ? 'BUY' : drift7d > -0.03 ? 'HOLD' : 'SELL';
    const signalColor = signal.includes('BUY') ? 'var(--green)' : signal==='HOLD' ? 'var(--yellow)' : 'var(--red)';
    return {drift7d, drift30d, conf, signal, signalColor, volatility};
  }

  return `
    <div style="padding:10px 16px;background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.2);border-radius:8px;margin-bottom:20px;font-size:11px;color:var(--purple);">
      ⬡ AI MODEL — Momentum + Mean Reversion ensemble. Uses 30-day price momentum, holding period, unrealised P&L signal, and sector-adjusted mean reversion. Confidence intervals based on historical NSE volatility. NOT financial advice.
    </div>

    <div style="display:flex;flex-direction:column;gap:12px;">
      ${pos.map(p => {
        const pred = predict(p);
        const p7   = (pred.drift7d*100).toFixed(2);
        const p30  = (pred.drift30d*100).toFixed(2);
        const conf = (pred.conf*100).toFixed(0);
        const pnlPct = p.avg_cost > 0 ? ((p.current_price-p.avg_cost)/p.avg_cost*100).toFixed(2) : '0';
        return `<div class="pred-card">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;">
            <div>
              <div style="font-weight:700;font-size:14px;">${p.display_name||p.symbol}</div>
              <div class="mono" style="font-size:9px;color:var(--blue3);">${p.symbol}</div>
            </div>
            <span class="badge" style="background:rgba(167,139,250,0.1);border-color:rgba(167,139,250,0.3);color:${pred.signalColor};">${pred.signal}</span>
            <div style="margin-left:auto;text-align:right;">
              <div class="mono" style="font-size:12px;font-weight:700;">₹${p.current_price.toLocaleString('en-IN')}</div>
              <div class="mono" style="font-size:10px;color:${parseFloat(pnlPct)>=0?'var(--green)':'var(--red)'};">${parseFloat(pnlPct)>=0?'+':''}${pnlPct}% from cost</div>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px;">
            <div class="metric-mini">
              <div class="metric-mini-label">7D Target</div>
              <div class="metric-mini-val" style="color:${parseFloat(p7)>=0?'var(--green)':'var(--red)'};">${parseFloat(p7)>=0?'+':''}${p7}%</div>
            </div>
            <div class="metric-mini">
              <div class="metric-mini-label">30D Target</div>
              <div class="metric-mini-val" style="color:${parseFloat(p30)>=0?'var(--green)':'var(--red)'};">${parseFloat(p30)>=0?'+':''}${p30}%</div>
            </div>
            <div class="metric-mini">
              <div class="metric-mini-label">Confidence</div>
              <div class="metric-mini-val" style="color:${conf>70?'var(--green)':conf>50?'var(--yellow)':'var(--red)'};">${conf}%</div>
            </div>
            <div class="metric-mini">
              <div class="metric-mini-label">Volatility</div>
              <div class="metric-mini-val" style="color:var(--orange);">${(pred.volatility*100).toFixed(1)}%</div>
            </div>
            <div class="metric-mini">
              <div class="metric-mini-label">Signal</div>
              <div class="metric-mini-val" style="font-size:10px;color:${pred.signalColor};">${pred.signal}</div>
            </div>
          </div>

          <!-- Confidence bar -->
          <div style="margin-bottom:6px;">
            <div style="display:flex;justify-content:space-between;font-size:9px;font-family:var(--mono);color:var(--text3);margin-bottom:3px;"><span>MODEL CONFIDENCE</span><span>${conf}%</span></div>
            <div style="height:3px;background:var(--bg0);border-radius:2px;">
              <div style="width:${conf}%;height:100%;background:linear-gradient(to right,var(--purple),var(--cyan));border-radius:2px;"></div>
            </div>
          </div>
          <!-- Price target range -->
          <div style="font-size:10px;color:var(--text3);">
            30-day range: <span class="mono" style="color:var(--red);">₹${(p.current_price*(1+parseFloat(p30)/100-pred.volatility*2)).toFixed(0)}</span>
            <span style="color:var(--text3);margin:0 4px;">—</span>
            <span class="mono" style="color:var(--green);">₹${(p.current_price*(1+parseFloat(p30)/100+pred.volatility*2)).toFixed(0)}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function showAddClient() {

  setActiveNav('add-client');
  document.getElementById('main-content').innerHTML = `<div class="page fade-in">
    <div class="section-head"><div><div class="page-title">Add New Client</div><div class="page-sub">Create a client profile with target allocation</div></div></div>
    <div class="card" style="max-width:520px;">
      <div style="display:flex;flex-direction:column;gap:0;">
        <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="f-name" placeholder="e.g. Arjun Patel"></div>
        <div class="grid-2"><div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="f-email" placeholder="client@email.com"></div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="f-phone" placeholder="+91-XXXXXXXXXX"></div></div>
        <div class="form-group" style="margin-top:8px;">
          <label class="form-label">Target Allocation (must total 100%)</label>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:6px;">
            ${[['equity','Equity','60'],['bond','Bonds','30'],['gold','Gold','10']].map(([id,label,def])=>`<div>
              <div style="font-size:10px;color:var(--text2);margin-bottom:4px;">${label}</div>
              <div style="display:flex;align-items:center;gap:4px;">
                <input class="form-input" type="number" id="f-${id}" value="${def}" min="0" max="100" style="padding:8px 10px;">
                <span style="color:var(--text3);">%</span>
              </div>
            </div>`).join('')}
          </div>
        </div>
        <button class="btn btn-primary" onclick="submitClient()" style="margin-top:8px;width:100%;">Create Client →</button>
        <div id="client-msg" style="font-size:12px;margin-top:8px;font-family:var(--mono);"></div>
      </div>
    </div>
  </div>`;
}

async function submitClient() {
  const msg = document.getElementById('client-msg');
  const name = document.getElementById('f-name').value.trim();
  const equity = parseFloat(document.getElementById('f-equity').value);
  const bond   = parseFloat(document.getElementById('f-bond').value);
  const gold   = parseFloat(document.getElementById('f-gold').value);
  if (!name) { msg.style.color='var(--red)'; msg.textContent='Name is required'; return; }
  if (Math.abs(equity+bond+gold-100) > 0.5) { msg.style.color='var(--red)'; msg.textContent=`Allocations add to ${equity+bond+gold}% — must be 100%`; return; }
  try {
    const res = await api('/client','POST',{name,email:document.getElementById('f-email').value,phone:document.getElementById('f-phone').value,target_equity:equity,target_bond:bond,target_gold:gold});
    msg.style.color='var(--green)'; msg.textContent=`✓ ${res.message} — ID: ${res.client_id}`;
    await loadSidebar();
    setTimeout(()=>showClient(res.client_id), 1500);
  } catch(e) { msg.style.color='var(--red)'; msg.textContent='Error: '+e.message; }
}

    <div class="card" style="max-width:520px;">
      <div style="display:flex;flex-direction:column;gap:0;">

        <div class="grid-2">

        </div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Purchase Date *</label><input class="form-input" type="date" id="p-date"></div>
          <div class="form-group"><label class="form-label">Asset Class *</label>

async function submitPosition() {
  const msg = document.getElementById('pos-msg');
  const symbol = document.getElementById('p-symbol').value.trim().toUpperCase();
  const name   = document.getElementById('p-name').value.trim();
  const qty    = parseFloat(document.getElementById('p-qty').value);
  const cost   = parseFloat(document.getElementById('p-cost').value);
  const date   = document.getElementById('p-date').value;
  if (!symbol||!name||!qty||!cost||!date) { msg.style.color='var(--red)'; msg.textContent='All fields are required'; return; }
  try {
    const res = await api('/position','POST',{client_id:document.getElementById('p-client').value,symbol,display_name:name,quantity:qty,avg_cost:cost,asset_class:document.getElementById('p-class').value,purchase_date:date});
    msg.style.color='var(--green)'; msg.textContent='✓ '+res.message;
    await loadSidebar();
    setTimeout(()=>showClient(document.getElementById('p-client').value), 1200);
  } catch(e) { msg.style.color='var(--red)'; msg.textContent='Error: '+e.message; }
}

// ─── DELETE ───────────────────────────────────────────────────────────────────
function confirmDelete(id, name) {
  if (!confirm(`Delete "${name}" and all their positions?\nThis cannot be undone.`)) return;
  deleteClient(id, name);
}
async function deleteClient(id, name) {
  try {
    await fetch(`${API.replace('/api','')}/api/client/${id}`,{method:'DELETE'});
    await loadSidebar();
    showDashboard();
    const toast = document.createElement('div');
    toast.textContent = `✓ ${name} deleted`;
    toast.style = 'position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);color:var(--green);padding:12px 20px;border-radius:8px;font-size:12px;font-family:var(--mono);z-index:9999;animation:fadeIn .2s ease;';
    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(), 3000);
  } catch(e) { alert('Error: '+e.message); }
}

// ─── REFRESH PRICES ───────────────────────────────────────────────────────────
async function refreshPrices() {
  const el = document.getElementById('price-status');
  const dot = document.getElementById('price-dot');
  el.textContent = 'Refreshing...';
  dot.style.background = 'var(--yellow)';
  try {
    const res = await api('/prices/refresh','POST');
    el.textContent = `${res.refreshed} prices updated`;
    dot.style.background = 'var(--green)';
    setTimeout(()=>{ el.textContent='Live (Yahoo Finance)'; }, 3000);
  } catch(e) {
    el.textContent = 'Refresh failed';
    dot.style.background = 'var(--red)';
  }
}
